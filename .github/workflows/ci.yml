name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    - name: Build Docker Frontend
      run: |
        cat <<EOF > frontend/Dockerfile
        FROM node:18-alpine
        WORKDIR /app
        COPY ./package.json ./package-lock.json* ./
        RUN npm install
        COPY ./ ./
        RUN npm run build
        CMD ["npm", "run", "preview"]
        EOF
        cd frontend && docker build -t sales-insight-frontend:latest .
        
    - name: Build Docker Backend Image
      run: docker build -t sales-insight-backend:latest .
